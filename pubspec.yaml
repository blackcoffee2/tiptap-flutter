name: tiptap_flutter
description: A Flutter port of the Tiptap rich-text editor, powered by a headless WebView engine. Provides composable widgets and a controller-based API for building rich-text editing experiences.
version: 0.0.1
homepage: https://github.com/blackcoffee2/tiptap-flutter

environment:
  sdk: ^3.8.0
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  webview_flutter: ^4.12.0
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  assets:
    - assets/engine/
